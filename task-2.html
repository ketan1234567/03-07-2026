<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        async function fetchActiveTodos(userId) {
    try {
        const response = await fetch(
            "https://jsonplaceholder.typicode.com/todos"
        );

        if (!response.ok) {
            throw new Error("API failed");
            return 
        }

        const todos = await response.json();
      //  console.log(todos);
        

        const userTodos = todos.filter((todos_one)=>{
        
        return    todos_one.userId===userId &&  todos_one.completed === false;
        
        });
        console.log(userTodos);
        

        return userTodos;
    } catch (error) {
        console.log(error);
    }
}

fetchActiveTodos(1).then((value)=>{
    console.log(value);
}).catch((error)=>{
    console.log(error);
    
})

    </script>
    
</body>
</html>
