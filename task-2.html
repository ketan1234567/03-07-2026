<body>

    <script>
        const obj = {
  name: "Ketan",
  show() {
    console.log(this.name);
  }
};

console.log(obj.name);


const fn = obj.show;

fn();

obj.show();

const bound = obj.show.bind(obj);

bound();

// this method can acess lexical scope object of this 

    </script>
