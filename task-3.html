    <script>
        let timer
        function debounce(fn, delay) {

  return function (name) {
    clearTimeout(timer);

   timer= setTimeout(() => {
    console.log("API Call...");
      fn(name);
    }, delay);
  };
}

const result=debounce((value)=>{
    console.log("sucesss",value);
    
},2000)

console.log(result("vishal"));

    </script>
