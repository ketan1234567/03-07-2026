Promise.myAll = function (promises) {
    return new Promise((resolve, reject) => {

        const results = [];
        let completed = 0;

        if (promises.length === 0) {
            resolve(results);
            return;
        }

        for (let i = 0; i < promises.length; i++) {

            promises[i]
                .then((value) => {

                    results[i] = value;

                    completed++;

                    if (completed === promises.length) {
                        resolve(results);
                    }

                })
                .catch((error) => {
                    reject(error);
                });
        }

    });
};
