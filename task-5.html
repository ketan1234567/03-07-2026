<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <input id="search" oninput="showUser(event)" placeholder="Search users">

    <select id="sort">
        <option value="asc">A-Z</option>
        <option value="desc">Z-A</option>
    </select>

    <button id="refresh">Refresh</button>

    <p id="status"></p>

    <ul id="users"></ul>

    <script>

        let UserList = []

        function showUser(event) {
            try {
        const user = event.target.value.toLowerCase()

        const result = UserList.filter((value) =>
            value.username.toLowerCase().includes(user)
        )

        const output = result.map((value) => {
            return `<li>${value.username}</li>`
        }).join("")

        if (result.length === 0) {
            document.getElementById("users").innerHTML =
                "<li>User not found</li>"
            return
        }

        document.getElementById("users").innerHTML = output

    } catch (error) {
        console.log(error)
    }
        }
        

        async function userList() {
            try {
                const data = await fetch("https://jsonplaceholder.typicode.com/users")
                const response = await data.json()
                UserList = response
                const result = UserList.map((value) => {
                    return `<li>${value.username}</li>`
                }).join("")
                //console.log(result);
                const search = document.getElementById("users").innerHTML = result
            } catch (error) {
                console.log(error);

            }
        }

        userList().then((value) => {
            console.log(value);
        }).catch((error) => {
            console.log(error);

        })




        const sort=document.getElementById("sort")
        sort.addEventListener("change",()=>{
            const value=sort.value
            if (value==="asc") {
                UserList.sort((a,b)=>{
                    return a.username.localeCompare(b.username)
                })
            }else{

                                UserList.sort((a,b)=>{
                    return b.username.localeCompare(a.username)
                })

            }

                document.getElementById("users").innerHTML = UserList
        .map((item) => `<li>${item.username}</li>`)
        .join("");
        })
    </script>

</body>

</html>
