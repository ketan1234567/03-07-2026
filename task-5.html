<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <input id="search" input(event) placeholder="Search users">

<ul id="users"></ul>

    <script>

    let userList=[]


     


let timer;

function debounce(fn, delay) {
    return function (event) {
        clearTimeout(timer);

        timer = setTimeout(() => {
            fn(event);
        }, delay);
    };
}

function searchUsers(event) {
    try {
        const searchText = event.target.value.toLowerCase();

        const filteredUsers = userList.filter((item) =>
            item.username.toLowerCase().includes(searchText)
        );

        if (filteredUsers.length === 0) {
            document.getElementById("users").innerHTML =
                "<li>No users found</li>";
            return;
        }

        const output = filteredUsers
            .map((item) => `<li>${item.username}</li>`)
            .join("");

        document.getElementById("users").innerHTML = output;

    } catch (error) {
        console.log(error);
    }
}

const demo = document.getElementById("search");

const searchHandler = debounce(searchUsers, 300);

demo.addEventListener("input", searchHandler);


    async function showUserList(){
        try {
            const response= await fetch("https://jsonplaceholder.typicode.com/users")
            if (!response.ok) {
               throw new Error("NO User Found");
                
            }
            const result=await response.json()
        userList=result
        console.log(userList);

        const output=userList.map((item)=>{
            return `<li>${item.username}</li>`
        }).join("")

        document.getElementById("users").innerHTML=output
            
        } catch (error) {
            console.log(error);
            
        }
        
    }
       
 showUserList()
   
    </script>
    
</body>
</html>
