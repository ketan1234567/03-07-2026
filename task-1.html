<body>

    <script>
        console.log("Start");
         
async function first() {
    console.log("First 1");

    await second();

    console.log("First 2");
}

async function second() {
    console.log("Second 1");

    await Promise.resolve();

    console.log("Second 2");
}

first();

Promise.resolve()
    .then(() => console.log("Promise"));

queueMicrotask(() => {
    console.log("Microtask");
});

setTimeout(() => {
    console.log("Timeout");
}, 0);

console.log("End");

//first-1

//second-2

//promise

    </script>   
    
</body>
