</head>
<body>

    <script>
      if (!Array.prototype.includes) {
    Array.prototype.includes = function(value) {
        return this.indexOf(value) !== -1;
    };
}

const arr = [10, 20, 30];

console.log(arr.includes(20)); // true
console.log(arr.includes(40)); // false
    </script>   
    
</body>
</html>
